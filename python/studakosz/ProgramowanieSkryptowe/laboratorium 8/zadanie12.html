<!DOCTYPE html>
<html>
<body>
    <form oninput="wynik.value = pole_tekstowe.value + pole_liczbowe.value">
        <input id="pole_tekstowe" type="text" placeholder="Wprowadź tekst">
        +
        <input id="pole_liczbowe" type="number" placeholder="Wprowadź liczbe">    
        =
        <output name="wynik" for="pole_tekstowe pole_liczbowe">Tu pojawi się wynik obliczeń</output>    
        <br>    
        <input type="button" value="Wypisz">
      </form>
<script>
function wczytajIWypisz() {
  for (let i = 0; i < 4; i++) {
    let wczytanaWartosc = prompt("Podaj wartosc:");
    console.log(`${wczytanaWartosc}:${typeof wczytanaWartosc}`);
  }
}
</script>

<button onclick="wczytajIWypisz()">Kliknij, aby uruchomić funkcję</button>

</body>
</html>
